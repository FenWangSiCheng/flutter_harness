# New UI targets introduced by the "home-todolist" spec.
# Approved deltas are generated into docs/harness/specs/ui-map.yaml by:
#   fvm dart run tool/harness.dart spec ui-map
targets:
  home.todo.page:
    type: page
    semantics_identifier: home.todo.page
    label: Todo List page
  home.todo.title:
    type: text
    semantics_identifier: home.todo.title
    label: Todo List
  home.todo.input:
    type: text_field
    semantics_identifier: home.todo.input
    label: Task
  home.todo.add:
    type: button
    semantics_identifier: home.todo.add
    label: Add task
  home.todo.empty:
    type: empty_state
    semantics_identifier: home.todo.empty
    label: No tasks yet
  home.todo.list:
    type: list
    semantics_identifier: home.todo.list
    label: Todo list
  home.todo.checkbox.0:
    type: checkbox
    semantics_identifier: home.todo.checkbox.0
    label: First task completion checkbox
  home.todo.delete.0:
    type: button
    semantics_identifier: home.todo.delete.0
    label: Delete first task
  home.todo.completed_count:
    type: text
    semantics_identifier: home.todo.completed_count
    label: Completed count
