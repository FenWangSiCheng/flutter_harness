# Source: approved docs/harness/specs/*/ui-map.delta.yaml files.
targets:
  home.counter.value:
    kind: text
    semantics_identifier: home.counter.value
    description: 'Current step count label, e.g. "Steps: 0".'
  home.counter.increment:
    kind: button
    text: '+1'
    semantics_identifier: home.counter.increment
    description: Increments the step counter by one.
  home.counter.reset:
    kind: button
    text: Reset
    semantics_identifier: home.counter.reset
    description: Resets the step counter to zero.
  home.counter.decrement:
    kind: button
    text: '-1'
    semantics_identifier: home.counter.decrement
    description: Decrements the step counter by one (minimum zero).
  home.user.card:
    kind: container
    semantics_identifier: home.user.card
    description: User info card displayed on the Home page.
  home.user.avatar:
    kind: image
    semantics_identifier: home.user.avatar
    description: User avatar image inside the Home page user card.
  home.user.name:
    kind: text
    semantics_identifier: home.user.name
    description: 'User name label, e.g. "Name: John Doe".'
  home.user.email:
    kind: text
    semantics_identifier: home.user.email
    description: 'User email label, e.g. "Email: john.doe@example.com".'
  home.user.loading:
    kind: indicator
    semantics_identifier: home.user.loading
    description: Loading indicator shown while fetching user data on the Home page.
