spec: home-counter
feature: feat-001
goal: 'Verify that a user can increment a step counter on the Home page and reset it to zero.'
preconditions:
  - Run the dev flavor.
  - The Home tab can be opened from the bottom navigation bar.
acceptance:
  - id: a1
    claim: 'Home page shows "Steps: 0" initially.'
    kind: maestro
    flow: home_counter_flow
  - id: a2
    claim: 'Tapping "+1" increments the counter to "Steps: 1".'
    kind: maestro
    flow: home_counter_flow
  - id: a3
    claim: 'Tapping "+1" again increments the counter to "Steps: 2".'
    kind: maestro
    flow: home_counter_flow
  - id: a4
    claim: 'Tapping Reset returns the counter to "Steps: 0".'
    kind: maestro
    flow: home_counter_flow
