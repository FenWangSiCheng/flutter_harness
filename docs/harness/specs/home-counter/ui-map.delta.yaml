# New UI targets introduced by the "home-counter" spec.
# Approved deltas are generated into docs/harness/specs/ui-map.yaml by:
#   fvm dart run tool/harness.dart spec ui-map
targets:
  home.counter.value:
    kind: text
    semantics_identifier: home.counter.value
    description: 'Current step count label, e.g. "Steps: 0".'
  home.counter.increment:
    kind: button
    text: "+1"
    semantics_identifier: home.counter.increment
    description: Increments the step counter by one.
  home.counter.reset:
    kind: button
    text: Reset
    semantics_identifier: home.counter.reset
    description: Resets the step counter to zero.
