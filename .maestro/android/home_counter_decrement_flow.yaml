appId: com.example.basic_demo.dev
---
- launchApp
- tapOn:
    id: "main_tab.home"
- assertVisible: "Steps: 0"
# Try decrement at zero — should stay at 0
- tapOn:
    id: "home.counter.decrement"
- extendedWaitUntil:
    visible: "Steps: 0"
    timeout: 10000
# Increment twice to reach 2
- tapOn:
    id: "home.counter.increment"
- extendedWaitUntil:
    visible: "Steps: 1"
    timeout: 10000
- tapOn:
    id: "home.counter.increment"
- extendedWaitUntil:
    visible: "Steps: 2"
    timeout: 10000
# Decrement to 1
- tapOn:
    id: "home.counter.decrement"
- extendedWaitUntil:
    visible: "Steps: 1"
    timeout: 10000
# Decrement to 0
- tapOn:
    id: "home.counter.decrement"
- extendedWaitUntil:
    visible: "Steps: 0"
    timeout: 10000
# Decrement at zero again — should stay at 0
- tapOn:
    id: "home.counter.decrement"
- extendedWaitUntil:
    visible: "Steps: 0"
    timeout: 10000
